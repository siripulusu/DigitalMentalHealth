{% extends "base.html" %}
{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[50vh]">
  <div class="bg-white p-10 rounded-2xl shadow-md border text-center max-w-md">

    <h1 class="text-2xl font-semibold text-green-600 mb-3">
      Password Updated
    </h1>
    <p class="text-sm text-gray-600 mb-6">
      Your password has been changed successfully.
    </p>

    <a href="/auth/login/"
       class="inline-block px-6 py-3 rounded-xl bg-teal-700 text-white
              hover:bg-teal-800 hover:shadow-lg transition">
      Login Now
    </a>
  </div>
</div>
{% endblock %}
