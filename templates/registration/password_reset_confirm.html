{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-screen bg-gray-50 py-12">
  <div class="bg-white p-10 rounded-2xl shadow-md border max-w-md w-full">
    <h1 class="text-2xl font-semibold mb-2 text-center">Create New Password</h1>
    <p class="text-sm text-gray-500 text-center mb-8">Please enter your new password below.</p>

    <form method="post" class="space-y-6" id="passwordForm">
      {% csrf_token %}
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <div class="relative">
          <input type="password" name="new_password1" id="id_new_password1" required
                 class="w-full px-4 py-2 pr-12 rounded-lg border focus:ring-2 focus:ring-teal-600 outline-none transition">
          <button type="button" onclick="togglePassword('id_new_password1', this)" 
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-teal-600 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.399 8.049 7.21 5 12 5c4.791 0 8.601 3.049 9.964 6.678.051.138.051.294 0 .432-1.363 3.629-5.173 6.678-9.964 6.678-4.791 0-8.601-3.049-9.964-6.678z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
        
        <div class="mt-4 space-y-2">
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Requirements</p>
          <ul id="password-requirements" class="text-sm space-y-1">
            <li id="length" class="flex items-center text-gray-400 transition-colors">
              <span class="icon mr-2 text-xs">○</span> At least 8 characters
            </li>
            <li id="uppercase" class="flex items-center text-gray-400 transition-colors">
              <span class="icon mr-2 text-xs">○</span> One uppercase letter
            </li>
            <li id="number" class="flex items-center text-gray-400 transition-colors">
              <span class="icon mr-2 text-xs">○</span> One number or special character
            </li>
          </ul>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <div class="relative">
          <input type="password" name="new_password2" id="id_new_password2" required
                 class="w-full px-4 py-2 pr-12 rounded-lg border focus:ring-2 focus:ring-teal-600 outline-none transition">
          <button type="button" onclick="togglePassword('id_new_password2', this)" 
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-teal-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.399 8.049 7.21 5 12 5c4.791 0 8.601 3.049 9.964 6.678.051.138.051.294 0 .432-1.363 3.629-5.173 6.678-9.964 6.678-4.791 0-8.601-3.049-9.964-6.678z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </div>

      <button id="submitBtn" disabled
        class="w-full py-3 rounded-xl bg-gray-300 text-white font-bold cursor-not-allowed transition-all">
        Update Password
      </button>
    </form>
  </div>
</div>

<script>
  const password = document.getElementById('id_new_password1');
  const confirm = document.getElementById('id_new_password2');
  const submitBtn = document.getElementById('submitBtn');

  // Toggle Password Visibility
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.classList.add('text-teal-600');
    } else {
      input.type = 'password';
      btn.classList.remove('text-teal-600');
    }
  }

  // Real-time Validation Logic
  const requirements = {
    length: document.getElementById('length'),
    uppercase: document.getElementById('uppercase'),
    number: document.getElementById('number')
  };

  function updateRequirement(element, isValid) {
    const icon = element.querySelector('.icon');
    if (isValid) {
      element.classList.replace('text-gray-400', 'text-green-600');
      icon.innerHTML = '✓';
    } else {
      element.classList.replace('text-green-600', 'text-gray-400');
      icon.innerHTML = '○';
    }
  }

  function validate() {
    const val = password.value;
    const hasLength = val.length >= 8;
    const hasUpper = /[A-Z]/.test(val);
    const hasNum = /[0-9!@#$%^&*]/.test(val);
    const matches = val === confirm.value && val !== "";

    updateRequirement(requirements.length, hasLength);
    updateRequirement(requirements.uppercase, hasUpper);
    updateRequirement(requirements.number, hasNum);

    if (hasLength && hasUpper && hasNum && matches) {
      submitBtn.disabled = false;
      submitBtn.classList.replace('bg-gray-300', 'bg-teal-700');
      submitBtn.classList.replace('cursor-not-allowed', 'hover:bg-teal-800');
    } else {
      submitBtn.disabled = true;
      submitBtn.classList.replace('bg-teal-700', 'bg-gray-300');
      submitBtn.classList.add('cursor-not-allowed');
    }
  }

  password.addEventListener('input', validate);
  confirm.addEventListener('input', validate);
</script>
{% endblock %}
