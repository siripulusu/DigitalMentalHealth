{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[50vh]">
  <div class="bg-white p-10 rounded-2xl shadow-md border text-center max-w-md">
    <h1 class="text-2xl font-semibold mb-3">Email Sent</h1>
    <p class="text-sm text-gray-600">
      Check your inbox for the password reset link.
    </p>
    <div class="mt-6 text-center">
      <a href="{% url 'login' %}" class="w-full mt-6 py-3 px-9 rounded-xl bg-teal-700 text-white font-semibold
               hover:bg-teal-800 hover:shadow-lg transform active:scale-95 transition-all">Back to Login</a>
    </div>
  </div>
  
</div>
{% endblock %}
