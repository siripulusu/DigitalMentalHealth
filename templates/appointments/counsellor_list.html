<h2>Your Appointments</h2>

<table border="1">
<tr>
    <th>Student</th>
    <th>Date</th>
    <th>Time</th>
    <th>Status</th>
    <th>Guidance</th>
</tr>

{% for a in appointments %}
<tr>
    <td>{{ a.student.username }}</td>
    <td>{{ a.date }}</td>
    <td>{{ a.time_slot }}</td>
    <td>{{ a.status }}</td>
    <td>
        {% if a.guidance_message %}
            Added
        {% else %}
            <a href="/appointments/guidance/{{ a.id }}/">Add</a>
        {% endif %}
    </td>
</tr>
{% endfor %}
</table>
