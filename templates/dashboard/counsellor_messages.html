{% extends "base2.html" %}
{% block title %}Guidance Messages{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto py-8">
  <h1 class="text-3xl font-semibold mb-6 text-gray-800">Guidance Messages</h1>

  <form method="POST" class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
    {% csrf_token %}
    
    <div>
      <label for="guidance" class="block text-sm font-medium text-gray-700 mb-2">
        Your Message
      </label>
      <textarea 
        id="guidance"
        name="guidance" 
        rows="4" 
        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition"
        placeholder="Write supportive guidance..."
        required></textarea>
    </div>

    <div class="flex justify-end">
      <button 
        type="submit" 
        class="px-6 py-2 bg-teal-700 hover:bg-teal-800 text-white font-medium rounded-lg transition duration-200">
        Send Guidance
      </button>
    </div>
  </form>
</section>
{% endblock %}
