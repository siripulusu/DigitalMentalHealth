{% extends "base2.html" %}
{% block content %}
<div class="max-w-xl mx-auto py-12">
    <h1 class="text-2xl font-black text-gray-800 mb-8">Edit User Profile</h1>
    
    <form method="POST" class="bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-2xl space-y-6">
        {% csrf_token %}
        <div>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">Username</label>
            <input type="text" name="username" value="{{ target.username }}" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-600 outline-none font-bold text-gray-700">
        </div>
        <div>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">Email Address</label>
            <input type="email" name="email" value="{{ target.email }}" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-600 outline-none font-bold text-gray-700">
        </div>
        <div>
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">Role Authority</label>
            <select name="role" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-600 outline-none font-bold text-gray-700">
                <option value="student" {% if target.role == 'student' %}selected{% endif %}>Student</option>
                <option value="counsellor" {% if target.role == 'counsellor' %}selected{% endif %}>Counsellor</option>
                <option value="peer" {% if target.role == 'peer' %}selected{% endif %}>Peer Volunteer</option>
                <option value="admin" {% if target.role == 'admin' %}selected{% endif %}>Administrator</option>
            </select>
        </div>
        
        <button type="submit" class="w-full py-4 bg-teal-700 text-white font-black rounded-2xl shadow-xl shadow-teal-100 hover:bg-teal-800 transition">
            Save Modifications
        </button>
    </form>
</div>
{% endblock %}
